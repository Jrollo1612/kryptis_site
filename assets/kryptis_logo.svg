<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Logo Kryptis</title>
<desc>Badge circulaire bleu avec le nom Kryptis, des symboles de différents codes secrets autour de l'éclair</desc>

<defs>
  <radialGradient id="bgGrad" cx="45%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#3ab5f5"/>
    <stop offset="100%" stop-color="#1565c0"/>
  </radialGradient>
  <radialGradient id="boltGrad" cx="40%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#ffe566"/>
    <stop offset="100%" stop-color="#f5a800"/>
  </radialGradient>
</defs>

<!-- Outer glow ring -->
<circle cx="200" cy="200" r="192" fill="#78d4ff" opacity="0.35"/>
<!-- White border ring -->
<circle cx="200" cy="200" r="183" fill="white"/>
<!-- Dark blue thin ring -->
<circle cx="200" cy="200" r="176" fill="#1255a0"/>
<!-- Main blue background -->
<circle cx="200" cy="200" r="168" fill="url(#bgGrad)"/>

<!-- LEFT SIDE SYMBOLS -->
<text x="78" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#ffe566">A=K</text>

<rect x="50" y="118" width="8" height="8" rx="1" fill="none" stroke="#ffe566" stroke-width="1.2"/>
<rect x="60" y="118" width="8" height="8" rx="1" fill="none" stroke="#ffe566" stroke-width="1.2"/>
<rect x="70" y="118" width="8" height="8" rx="1" fill="none" stroke="#ffe566" stroke-width="1.2"/>
<rect x="50" y="128" width="8" height="8" rx="1" fill="none" stroke="#ffe566" stroke-width="1.2"/>
<rect x="60" y="128" width="8" height="8" rx="1" fill="#ffe566" opacity="0.4" stroke="#ffe566" stroke-width="1.2"/>
<rect x="70" y="128" width="8" height="8" rx="1" fill="none" stroke="#ffe566" stroke-width="1.2"/>
<rect x="50" y="138" width="8" height="8" rx="1" fill="none" stroke="#ffe566" stroke-width="1.2"/>
<rect x="60" y="138" width="8" height="8" rx="1" fill="none" stroke="#ffe566" stroke-width="1.2"/>
<rect x="70" y="138" width="8" height="8" rx="1" fill="none" stroke="#ffe566" stroke-width="1.2"/>
<text x="64" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffe566" opacity="0.85">Vigenère</text>

<text x="72" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#ffe566">6=N</text>

<rect x="46" y="192" width="36" height="22" rx="3" fill="none" stroke="#ffe566" stroke-width="1.5"/>
<circle cx="55" cy="203" r="4" fill="none" stroke="#ffe566" stroke-width="1.2"/>
<circle cx="73" cy="203" r="4" fill="none" stroke="#ffe566" stroke-width="1.2"/>
<line x1="59" y1="203" x2="69" y2="203" stroke="#ffe566" stroke-width="1"/>
<text x="64" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffe566" opacity="0.85">Cassette</text>

<!-- RIGHT SIDE SYMBOLS -->
<circle cx="322" cy="108" r="5" fill="#ffe566" opacity="0.85"/>
<circle cx="332" cy="108" r="5" fill="#ffe566" opacity="0.85"/>
<circle cx="327" cy="100" r="5" fill="#ffe566" opacity="0.85"/>
<circle cx="317" cy="100" r="5" fill="#ffe566" opacity="0.85"/>
<circle cx="337" cy="100" r="5" fill="#ffe566" opacity="0.85"/>
<line x1="327" y1="95" x2="327" y2="88" stroke="#ffe566" stroke-width="1.5"/>
<line x1="327" y1="88" x2="332" y2="84" stroke="#ffe566" stroke-width="1.2"/>
<text x="327" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffe566" opacity="0.85">Cassis</text>

<text x="327" y="155" text-anchor="middle" font-family="monospace" font-weight="700" font-size="15" fill="#ffe566">01</text>

<rect x="306" y="162" width="14" height="14" rx="1" fill="none" stroke="#ffe566" stroke-width="1.5"/>
<line x1="313" y1="162" x2="313" y2="176" stroke="#ffe566" stroke-width="1"/>
<line x1="306" y1="169" x2="320" y2="169" stroke="#ffe566" stroke-width="1"/>
<rect x="325" y="162" width="14" height="14" rx="1" fill="none" stroke="#ffe566" stroke-width="1.5"/>
<circle cx="332" cy="169" r="2.5" fill="#ffe566"/>
<text x="320" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffe566" opacity="0.85">Pigpen</text>

<text x="322" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#ffe566">ROT13</text>
<path d="M310 220 a10 10 0 1 1 12 8" fill="none" stroke="#ffe566" stroke-width="1.5" stroke-linecap="round"/>
<polygon points="322,228 318,222 326,222" fill="#ffe566"/>

<!-- Lightning bolt -->
<polygon points="210,58 178,152 202,152 188,228 232,130 206,130 226,58" fill="url(#boltGrad)" stroke="#d48000" stroke-width="2.5" stroke-linejoin="round"/>

<!-- Morse row 1 -->
<rect x="82" y="248" width="36" height="12" rx="6" fill="#f5c200"/>
<circle cx="140" cy="254" r="8" fill="#f5c200"/>
<rect x="155" y="248" width="36" height="12" rx="6" fill="#f5c200"/>
<circle cx="213" cy="254" r="8" fill="#f5c200"/>
<rect x="228" y="248" width="36" height="12" rx="6" fill="#f5c200"/>
<circle cx="286" cy="254" r="8" fill="#f5c200"/>
<rect x="300" y="248" width="36" height="12" rx="6" fill="#f5c200"/>

<!-- KRYPTIS text -->
<text x="200" y="312" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="46" fill="white" letter-spacing="3">KRYPTIS</text>

<!-- Morse row 2 -->
<circle cx="140" cy="348" r="8" fill="#f5c200"/>
<rect x="155" y="342" width="36" height="12" rx="6" fill="#f5c200"/>
<circle cx="213" cy="348" r="8" fill="#f5c200"/>
<line x1="228" y1="335" x2="240" y2="361" stroke="#f5c200" stroke-width="3.5" stroke-linecap="round"/>
<circle cx="260" cy="348" r="8" fill="#f5c200"/>

</svg>
