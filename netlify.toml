[[redirects]]
  from = "/online"
  to = "/trad"
  status = 301
  force = false
  query = {path = ":path"} #  apply this rule for /old-path?path=example
  conditions = {Language = ["en","es","fr","de","it"], Country = ["US","FR","GB","IT","ES","DE"]}

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"

    #  Multi-value headers are expressed with multi-line strings
  cache-control = '''
  max-age=0,
  no-cache,
  no-store,
  must-revalidate'''
